<style>
/* BREADCRUMB */
.breadcrumb { padding:16px 48px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; font-size:15px; color:var(--muted); }
.breadcrumb a { color:var(--muted); text-decoration:none; }
.breadcrumb a:hover { color:var(--text); }
.breadcrumb span { color:var(--border2); }

/* LAYOUT */
.page-layout { display:grid; grid-template-columns:260px 1fr; min-height:100vh; }

/* SIDEBAR */
.sidebar { border-right:1px solid var(--border); padding:24px 0; position:sticky; top:60px; height:calc(100vh - 60px); overflow-y:auto; }
.sidebar-section { padding:0 0 16px; border-bottom:1px solid var(--border); margin-bottom:16px; }
.sidebar-title { font-size:15px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); padding:8px 20px; font-family:'Geist Mono',monospace; }
.sidebar-link { display:flex; align-items:center; gap:10px; padding:10px 20px; font-size:15px; color:var(--muted); text-decoration:none; cursor:pointer; transition:all 0.15s; border-left:2px solid transparent; }
.sidebar-link:hover { color:var(--text); background:var(--surface); }
.sidebar-link.active { color:var(--accent); border-left-color:var(--accent); background:var(--surface); }
.sidebar-link .sl-dot { width:5px; height:5px; border-radius:50%; background:var(--border2); flex-shrink:0; }
.sidebar-link.active .sl-dot { background:var(--accent); }

.sidebar-company-card { margin:0 16px 16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; cursor:pointer; }
.scc-name { font-size:15px; font-weight:500; margin-bottom:2px; }
.scc-meta { font-size:15px; color:var(--muted); }

/* CONTENT */
.content { padding:40px 48px 80px; }

/* COMPANY HEADER */
.co-header { margin-bottom:36px; padding-bottom:32px; border-bottom:1px solid var(--border); }
.co-badge { display:inline-flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border2); border-radius:6px; padding:4px 12px; font-size:15px; color:var(--muted); margin-bottom:12px; font-family:'Geist Mono',monospace; }
.co-title { font-family:'Fraunces',serif; font-size:48px; font-weight:900; letter-spacing:-1.5px; margin-bottom:10px; }
.co-tagline { color:var(--muted); font-size:15px; line-height:1.65; max-width:640px; margin-bottom:16px; }
.co-pills { display:flex; gap:8px; flex-wrap:wrap; }
.co-pill { padding:5px 12px; border-radius:6px; font-size:15px; border:1px solid var(--border2); color:var(--muted); font-family:'Geist Mono',monospace; }

/* INSIGHT BOX */
.insight-box { background:linear-gradient(135deg,rgba(240,224,64,0.06),rgba(240,224,64,0.02)); border:1px solid rgba(240,224,64,0.2); border-radius:12px; padding:20px 24px; margin-bottom:36px; display:flex; gap:16px; align-items:flex-start; }
.insight-icon { font-size:20px; flex-shrink:0; }
.insight-title { font-size:15px; font-weight:600; color:var(--accent); margin-bottom:6px; }
.insight-text { font-size:15px; color:#aaa; line-height:1.65; }

/* SECTION HEADERS */
.sec-label { font-size:15px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; font-family:'Geist Mono',monospace; }
.sec-title { font-family:'Fraunces',serif; font-size:26px; font-weight:700; margin-bottom:24px; display:flex; align-items:center; gap:12px; }
.sec-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* BUSINESS MODEL */
.bm-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:48px; }
.bm-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px; }
.bm-num { font-family:'Fraunces',serif; font-size:36px; font-weight:900; color:var(--border2); margin-bottom:8px; }
.bm-title { font-size:15px; font-weight:600; margin-bottom:8px; line-height:1.3; }
.bm-body { font-size:15px; color:var(--muted); line-height:1.65; }

/* P&L WATERFALL */
.waterfall { margin-bottom:48px; }
.wf-row { display:grid; grid-template-columns:200px 1fr 70px 90px; align-items:center; gap:12px; margin-bottom:5px; }
.wf-label { font-size:15px; color:var(--muted); font-family:'Geist Mono',monospace; white-space:nowrap; }
.wf-label.bold { color:var(--text); font-weight:500; }
.wf-bar-wrap { height:28px; background:var(--surface); border-radius:4px; overflow:hidden; position:relative; }
.wf-bar { height:100%; border-radius:4px; display:flex; align-items:center; padding:0 10px; font-size:15px; font-weight:600; transition:width 1.2s cubic-bezier(0.4,0,0.2,1); min-width:4px; }
.wf-pct { font-family:'Geist Mono',monospace; font-size:15px; color:var(--muted); text-align:right; }
.wf-abs { font-family:'Geist Mono',monospace; font-size:15px; text-align:right; }
.wf-divider { grid-column:1/-1; height:1px; background:var(--border); margin:4px 0; }
.wf-row.highlight .wf-label { color:var(--accent); font-weight:600; }
.wf-row.highlight .wf-abs { color:var(--accent); font-weight:600; }
.wf-row.negative .wf-abs { color:var(--accent3); }

/* CHARTS */
.charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:48px; }
.chart-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; }
.chart-title { font-size:15px; font-weight:600; margin-bottom:4px; }
.chart-sub { font-size:15px; color:var(--muted); margin-bottom:20px; }
.chart-wrap { position:relative; height:200px; }

/* COST BREAKDOWN */
.cost-breakdown { margin-bottom:48px; }
.cost-row { display:grid; grid-template-columns:14px 2fr 3fr 60px; align-items:start; gap:16px; padding:18px 0; border-bottom:1px solid var(--border); }
.cost-row:last-child { border-bottom:none; }
.cost-dot { width:10px; height:10px; border-radius:50%; margin-top:4px; flex-shrink:0; }
.cost-name { font-size:15px; font-weight:600; margin-bottom:3px; }
.cost-pct-badge { font-family:'Geist Mono',monospace; font-size:15px; color:var(--muted); }
.cost-insight { font-size:15px; color:var(--muted); line-height:1.65; }
.cost-pct { font-family:'Geist Mono',monospace; font-size:22px; font-weight:500; text-align:right; }

/* COMPARE TABLE */
.compare-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-bottom:48px; }
.compare-header { display:grid; padding:14px 20px; border-bottom:1px solid var(--border); background:var(--surface2); }
.compare-row { display:grid; padding:14px 20px; border-bottom:1px solid var(--border); align-items:center; }
.compare-row:last-child { border-bottom:none; }
.compare-row:hover { background:var(--surface2); }
.compare-metric { font-size:15px; font-weight:500; }
.compare-metric-sub { font-size:15px; color:var(--muted); font-weight:400; }
.compare-val { font-family:'Geist Mono',monospace; font-size:15px; text-align:center; }
.val-good { color:var(--green); }
.val-mid { color:var(--accent); }
.val-low { color:var(--accent3); }
.val-highlighted { background:rgba(240,224,64,0.1); border-radius:4px; padding:2px 6px; }

/* INSIGHTS */
.insights-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:48px; }
.insight-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:22px; transition:all 0.2s; }

.ic-num { font-family:'Fraunces',serif; font-size:36px; font-weight:900; color:var(--border2); margin-bottom:8px; }
.ic-title { font-size:15px; font-weight:600; margin-bottom:8px; line-height:1.3; }
.ic-body { font-size:15px; color:var(--muted); line-height:1.65; }

      { "name": "Coolwinks", "gm": "48.0%", "ebitda": "-15.0%", "mktg": "25.0%", "emp": "14.0%", "pat": "-15.0%", "hl": false }
    ],
    "insights": [
      { "num": "01", "title": "67% gross margin in 'retail' — and most people don't understand why", "body": "Retail companies have 25–35% gross margins. Lenskart's 67% looks like a SaaS company. The reason: they manufacture their own lenses. A pair costs ₹80 to make and sells for ₹600–2,000. That manufacturing moat took years to build — competitors can't replicate it quickly. This is the structural advantage the P&L is showing you." },
      { "num": "02", "title": "Japan is secretly their highest-margin market", "body": "Japan contributed ~₹800 Cr in FY24 revenue. Japanese consumers pay ₹8,000–15,000 per frame vs ₹1,500 in India. Same manufacturing cost, much higher ASP = dramatically better per-unit economics. International segment growing 17% YoY — this is the real margin expansion story, not India." },
      { "num": "03", "title": "Depreciation was hiding ₹550 Cr of real profits — now it's reversing", "body": "Lenskart showed ₹10 Cr net loss in FY24 but EBITDA was +₹550 Cr (10% margin). The gap: ₹672 Cr of depreciation on 2,500 store fit-outs. Once stores are fully depreciated, this vanishes from the P&L. This is exactly what happened in FY25 — PAT jumped to ₹297 Cr. The 'loss-making startup' narrative was always wrong." }
    ]
  }
};

const OTHER_COMPANIES = { "nykaa": "lenskart", "lenskart": "nykaa" };
const COMPANY_NAMES = { "nykaa": "Nykaa", "lenskart": "Lenskart" };

function getParam(key) {
  return new URLSearchParams(window.location.search).get(key) || 'nykaa';
}

function scrollTo(id) {
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
  event.target.classList.add('active');
}

function valColor(v) {
  const n = parseFloat(v);
  if (n > 10) return 'val-good';
  if (n > 0) return 'val-mid';
  return 'val-low';
}

function render(id) {
  const d = DATA[id];
  if (!d) return;

  document.title = `GrowthRx — ${d.name} Analysis`;
  document.getElementById('breadcrumb-name').textContent = d.name;

  // Other companies sidebar
  const otherId = OTHER_COMPANIES[id];
  const otherName = COMPANY_NAMES[otherId];
  document.getElementById('other-companies').innerHTML = `
    <a href="company.html?id=${otherId}" class="sidebar-company-card" style="display:block;text-decoration:none;color:var(--text);margin:0 16px 8px;">
      <div class="scc-name">${otherName}</div>
      <div class="scc-meta">Retail & D2C • View Analysis →</div>
    </a>
  `;

  // Build P&L rows
  const pnlRows = d.pnl.map(row => {
    if (row.divider) return `<div class="wf-divider"></div>`;
    const isRevenue = row.type === 'revenue';
    const isCost = row.type === 'cost';
    const isLoss = row.type === 'loss';
    const isProfit = row.type === 'profit';
    const absPct = Math.abs(row.pct);
    const barColor = isRevenue ? 'var(--accent)' : isCost ? '#f04060' : isLoss ? '#f04060' : 'var(--green)';
    const barTextColor = (isRevenue || isLoss) ? '#000' : '#fff';
    const absColor = isCost || isLoss ? 'var(--accent3)' : isRevenue || isProfit ? (isProfit && row.highlight ? 'var(--accent)' : 'var(--green)') : 'var(--text)';
    return `
      <div class="wf-row ${row.highlight ? 'highlight' : ''}">
        <div class="wf-label ${row.highlight ? 'bold' : ''}">${row.label}</div>
        <div class="wf-bar-wrap">
          <div class="wf-bar" style="width:${Math.min(absPct,100)}%;background:${barColor};color:${barTextColor};">
            ${absPct > 8 ? Math.abs(row.pct) + '%' : ''}
          </div>
        </div>
        <div class="wf-pct" style="color:${absColor}">${row.pct > 0 ? '' : ''}${row.pct}%</div>
        <div class="wf-abs" style="color:${absColor}">₹${Math.abs(row.value).toLocaleString('en-IN')} Cr</div>
      </div>
    `;
  }).join('');

  // Build cost rows
  const costRows = d.costDetails.map(c => `
    <div class="cost-row">
      <div class="cost-dot" style="background:${c.color}"></div>
      <div>
        <div class="cost-name">${c.head}</div>
        <div class="cost-pct-badge">₹${c.crore.toLocaleString('en-IN')} Cr</div>
      </div>
      <div class="cost-insight">${c.insight}</div>
      <div class="cost-pct" style="color:${c.color}">${c.pct}%</div>
    </div>
  `).join('');

  // Build peer comparison
  const colCount = d.peers.length + 1;
  const gridCols = `2fr ${Array(d.peers.length).fill('1fr').join(' ')}`;
  const peerHeaders = d.peers.map(p => `<div class="compare-val" style="${p.hl ? 'color:var(--accent);font-weight:600' : 'color:var(--muted)'}">${p.name}</div>`).join('');
  const peerRows = [
    { label: 'Gross Margin', sub: 'Revenue − COGS', key: 'gm' },
    { label: 'EBITDA Margin', sub: 'Operating profit', key: 'ebitda' },
    { label: 'Marketing %', sub: 'of Revenue', key: 'mktg' },
    { label: 'Employee %', sub: 'of Revenue', key: 'emp' },
    { label: 'PAT Margin', sub: 'Net profit', key: 'pat' }
  ].map(r => `
    <div class="compare-row" style="grid-template-columns:${gridCols}">
      <div class="compare-metric">${r.label}<br><span class="compare-metric-sub">${r.sub}</span></div>
      ${d.peers.map(p => `<div class="compare-val ${valColor(p[r.key])} ${p.hl ? 'val-highlighted' : ''}">${p[r.key]}</div>`).join('')}
    </div>
  `).join('');

  // Build insights
  const insightCards = d.insights.map(i => `
    <div class="insight-card">
      <div class="ic-num">${i.num}</div>
      <div class="ic-title">${i.title}</div>
      <div class="ic-body">${i.body}</div>
    </div>
  `).join('');

  // Business model
  const bmCards = d.businessModel.map(b => `
    <div class="bm-card">
      <div class="bm-num">${b.num}</div>
      <div class="bm-title">${b.title}</div>
      <div class="bm-body">${b.body}</div>
    </div>
  `).join('');

  const statusTag = d.status === 'profitable'
    ? '<span class="tag-profit">PROFITABLE</span>'
    : '<span class="tag-neutral">NEAR BREAKEVEN</span>';

  document.getElementById('main-content').innerHTML = `
    <!-- HEADER -->
    <div class="co-header fade-up">
      <div class="co-badge">🛍️ Retail & D2C • ${d.sector} • ${d.fy}</div>
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:20px">
        <div class="co-title">${d.name}</div>
        <div style="text-align:right;flex-shrink:0;padding-top:10px">
          ${statusTag}
          <div style="font-family:'Geist Mono',monospace;font-size:28px;font-weight:700;color:var(--accent);margin-top:6px">₹${d.pnl[0].value.toLocaleString('en-IN')} Cr</div>
          <div style="font-size:15px;color:var(--muted);font-family:'Geist Mono',monospace">${d.fy} REVENUE</div>
        </div>
      </div>
      <div class="co-tagline">${d.tagline}</div>
      <div class="co-pills">${d.keyFacts.map(f => `<span class="co-pill">${f}</span>`).join('')}</div>
    </div>

    <!-- TOP INSIGHT -->
    <div class="insight-box">
      <div class="insight-icon">💡</div>
      <div>
        <div class="insight-title">${d.topInsight.title}</div>
        <div class="insight-text">${d.topInsight.text}</div>
      </div>
    </div>

    <!-- BUSINESS MODEL -->
    <div id="business-model">
      <div class="sec-label">Business Model</div>
      <div class="sec-title">How ${d.name} Makes Money</div>
      <div class="bm-grid">${bmCards}</div>
    </div>

    <!-- P&L WATERFALL -->
    <div id="pl-waterfall">
      <div class="sec-label">P&L Waterfall — ${d.fy}</div>
      <div class="sec-title">From Revenue to PAT</div>
      <div class="waterfall">${pnlRows}</div>
    </div>

    <!-- CHARTS -->
    <div id="cost-charts">
      <div class="sec-label">Visual Breakdown</div>
      <div class="sec-title">Cost Structure Charts</div>
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">Cost as % of Revenue</div>
          <div class="chart-sub">Where every rupee of revenue goes</div>
          <div class="chart-wrap"><canvas id="costPie"></canvas></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Gross Margin vs Peers</div>
          <div class="chart-sub">Industry comparison ${d.fy}</div>
          <div class="chart-wrap"><canvas id="gmBar"></canvas></div>
        </div>
      </div>
    </div>

    <!-- COST DEEP DIVE -->
    <div id="cost-breakdown">
      <div class="sec-label">Cost Deep Dive</div>
      <div class="sec-title">What's Behind Each Cost Head?</div>
      <div class="cost-breakdown">${costRows}</div>
    </div>

    <!-- BENCHMARKS -->
    <div id="benchmarks">
      <div class="sec-label">Industry Benchmark</div>
      <div class="sec-title">${d.name} vs Competitors</div>
      <div class="compare-card">
        <div class="compare-header" style="grid-template-columns:${gridCols}">
          <div style="font-size:15px;color:var(--muted);letter-spacing:1px;font-family:'Geist Mono',monospace">Metric</div>
          ${peerHeaders}
        </div>
        ${peerRows}
      </div>
    </div>

    <!-- UNIQUE INSIGHTS -->
    <div id="unique-insights">
      <div class="sec-label">What Nobody's Talking About</div>
      <div class="sec-title">Unique Insights</div>
      <div class="insights-grid">${insightCards}</div>
    </div>
  `;

  // Render charts
  setTimeout(() => {
    const pie = document.getElementById('costPie');
    const bar = document.getElementById('gmBar');
    if (pie) new Chart(pie.getContext('2d'), {
      type:'doughnut',
      data:{ labels:d.costPie.labels, datasets:[{ data:d.costPie.values, backgroundColor:d.costPie.colors, borderWidth:0, hoverOffset:8 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ color:'#888', font:{ size:11 }, boxWidth:10, padding:10 } } }, cutout:'65%' }
    });
    if (bar) new Chart(bar.getContext('2d'), {
      type:'bar',
      data:{
        labels: d.peers.map(p => p.name),
        datasets:[{ label:'Gross Margin %', data:d.peers.map(p => parseFloat(p.gm)), backgroundColor:d.peers.map(p => p.hl ? 'rgba(240,224,64,0.9)' : 'rgba(100,100,100,0.5)'), borderRadius:6, borderWidth:0 }]
      },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{ grid:{ color:'#1f1f1f' }, ticks:{ color:'#888', font:{ size:11 } } }, y:{ grid:{ color:'#1f1f1f' }, ticks:{ color:'#888', font:{ size:10 }, callback:v => v+'%' } } } }
    });
  }, 100);
}

render(getParam('id'));
</script>
</body>
</html>
